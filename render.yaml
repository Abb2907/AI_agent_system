services:
  - type: web
    name: ai-copilot
    runtime: python
    buildCommand: pip install fastapi uvicorn openai python-dotenv httpx sqlalchemy psycopg2-binary "python-jose[cryptography]" "passlib[bcrypt]" slowapi alembic "pydantic[email]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: LLM_MODEL
        value: llama-3.3-70b-versatile
      - key: DATABASE_URL
        fromDatabase:
          name: ai-copilot-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
    plan: free
    healthCheckPath: /health

databases:
  - name: ai-copilot-db
    plan: free

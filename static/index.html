<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e4e4e7;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 1rem 2rem;
            background: #1a1b23;
            border-bottom: 1px solid #2d2d3a;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }
        header .badge {
            font-size: 0.7rem;
            background: #22c55e;
            color: #000;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .message {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }
        .message.user {
            display: flex;
            justify-content: flex-end;
        }
        .message.user .bubble {
            background: #3b82f6;
            color: #fff;
            border-radius: 1rem 1rem 0.25rem 1rem;
            padding: 0.75rem 1.25rem;
            max-width: 70%;
        }
        .message.assistant .bubble {
            background: #1e1f2e;
            border: 1px solid #2d2d3a;
            border-radius: 0.25rem 1rem 1rem 1rem;
            padding: 1rem 1.25rem;
            max-width: 85%;
        }
        .message.assistant .answer {
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .steps-toggle {
            margin-top: 0.75rem;
            font-size: 0.8rem;
            color: #8b8b9e;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .steps-toggle:hover { color: #a5a5be; }
        .steps-panel {
            display: none;
            margin-top: 0.75rem;
            padding: 0.75rem;
            background: #13141c;
            border-radius: 0.5rem;
            border: 1px solid #2d2d3a;
            font-size: 0.8rem;
            font-family: 'JetBrains Mono', monospace;
        }
        .steps-panel.open { display: block; }
        .step {
            padding: 0.5rem 0;
            border-bottom: 1px solid #1e1f2e;
        }
        .step:last-child { border-bottom: none; }
        .step-label {
            color: #8b8b9e;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .step-plan { color: #f59e0b; }
        .step-tool { color: #22c55e; }
        .step-result { color: #a78bfa; }
        .input-area {
            padding: 1rem 2rem 1.5rem;
            background: #1a1b23;
            border-top: 1px solid #2d2d3a;
        }
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
        }
        #query-input {
            flex: 1;
            padding: 0.85rem 1.25rem;
            border-radius: 0.75rem;
            border: 1px solid #2d2d3a;
            background: #0f1117;
            color: #e4e4e7;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        #query-input:focus { border-color: #3b82f6; }
        #query-input::placeholder { color: #52526a; }
        #send-btn {
            padding: 0.85rem 1.5rem;
            border-radius: 0.75rem;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        #send-btn:hover { background: #2563eb; }
        #send-btn:disabled { background: #1e3a5f; cursor: not-allowed; }
        .loading {
            display: inline-flex;
            gap: 4px;
            align-items: center;
        }
        .loading span {
            width: 6px; height: 6px;
            background: #8b8b9e;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loading span:nth-child(2) { animation-delay: 0.2s; }
        .loading span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .examples {
            max-width: 800px;
            margin: 2rem auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.75rem;
        }
        .example-card {
            padding: 1rem;
            background: #1e1f2e;
            border: 1px solid #2d2d3a;
            border-radius: 0.75rem;
            cursor: pointer;
            transition: border-color 0.2s;
            font-size: 0.85rem;
            color: #a5a5be;
        }
        .example-card:hover { border-color: #3b82f6; color: #e4e4e7; }
        .example-card .icon { font-size: 1.2rem; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <header>
        <h1>AI Agent System</h1>
        <span class="badge">ONLINE</span>
    </header>

    <div class="chat-container" id="chat">
        <div class="examples" id="examples">
            <div class="example-card" onclick="sendQuery('What is 125 * 48 + 320?')">
                <div class="icon">🧮</div>
                Calculator: "What is 125 * 48 + 320?"
            </div>
            <div class="example-card" onclick="sendQuery('Explain how RAG systems work')">
                <div class="icon">📄</div>
                Retriever: "Explain how RAG systems work"
            </div>
            <div class="example-card" onclick="sendQuery('Who is Alan Turing?')">
                <div class="icon">🌐</div>
                Web Search: "Who is Alan Turing?"
            </div>
            <div class="example-card" onclick="sendQuery('What is machine learning?')">
                <div class="icon">💬</div>
                Direct: "What is machine learning?"
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-wrapper">
            <input type="text" id="query-input" placeholder="Ask anything... (math, documents, web search, or general)" autocomplete="off">
            <button id="send-btn" onclick="submitQuery()">Send</button>
        </div>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('query-input');
        const btn = document.getElementById('send-btn');
        const examples = document.getElementById('examples');

        input.addEventListener('keydown', e => { if (e.key === 'Enter') submitQuery(); });

        function sendQuery(text) {
            input.value = text;
            submitQuery();
        }

        async function submitQuery() {
            const query = input.value.trim();
            if (!query) return;

            if (examples) examples.remove();
            addMessage('user', query);
            input.value = '';
            btn.disabled = true;

            const loadingEl = addLoading();

            try {
                const resp = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                const data = await resp.json();
                loadingEl.remove();
                addAssistantMessage(data.answer, data.steps);
            } catch (err) {
                loadingEl.remove();
                addAssistantMessage('Error: Failed to reach the agent. Is the server running?', []);
            }

            btn.disabled = false;
            input.focus();
        }

        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function addLoading() {
            const div = document.createElement('div');
            div.className = 'message assistant';
            div.innerHTML = `<div class="bubble"><div class="loading"><span></span><span></span><span></span></div></div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function addAssistantMessage(answer, steps) {
            const div = document.createElement('div');
            div.className = 'message assistant';

            let stepsHtml = '';
            if (steps && steps.length > 0) {
                const stepsContent = steps.map(s => formatStep(s)).join('');
                stepsHtml = `
                    <div class="steps-toggle" onclick="this.nextElementSibling.classList.toggle('open')">
                        ▶ Show reasoning steps (${steps.length})
                    </div>
                    <div class="steps-panel">${stepsContent}</div>
                `;
            }

            div.innerHTML = `<div class="bubble"><div class="answer">${escapeHtml(answer)}</div>${stepsHtml}</div>`;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        function formatStep(step) {
            let html = '<div class="step">';
            if (step.plan) {
                html += `<div class="step-label">Plan (Iteration ${step.iteration})</div>`;
                html += `<div class="step-plan">Action: ${step.plan.action}`;
                if (step.plan.tool_name) html += ` → ${step.plan.tool_name}`;
                if (step.plan.parameters) html += ` (${step.plan.parameters})`;
                html += '</div>';
            } else if (step.tool_used) {
                html += `<div class="step-label">Tool Execution</div>`;
                html += `<div class="step-tool">🔧 ${step.tool_used}("${step.tool_input}")</div>`;
                html += `<div class="step-result">→ ${step.tool_output?.substring(0, 200) || 'done'}${(step.tool_output?.length > 200) ? '...' : ''}</div>`;
            } else if (step.final_answer) {
                html += `<div class="step-label">Final Answer Generated</div>`;
            }
            html += '</div>';
            return html;
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }
    </script>
</body>
</html>
